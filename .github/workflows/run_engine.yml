name: Trading Engine V2

on:
  schedule:
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trading-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare folders
        run: |
          mkdir -p data output
          cp -n data_template/*.csv data/ || true

      - name: Run trading engine
        run: python scripts/run_all.py

      - name: Commit outputs
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/*.csv
          git add output/*.csv || true
          git add output/*.xlsx || true
          git commit -m "Update trading signals" || echo "No changes to commit"
          git push
